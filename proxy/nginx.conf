# nginx reverse-proxy config — strips malformed HTTP headers
# ─────────────────────────────────────────────────────────────────────────────
# Problem:
#   The game loader sends "Charse t: UTF-8" (space in header name). Any strict
#   HTTP parser rejects the connection with 400 before the app handles it.
#
# Solution:
#   nginx's default  ignore_invalid_headers on  silently drops headers whose
#   names contain characters other than letters, digits, hyphens, and
#   underscores.  The request is forwarded to the Node.js app without the bad
#   header, and the app responds with valid JSON.
#
# ─────────────────────────────────────────────────────────────────────────────
# INSTALLATION (Ubuntu/Debian VPS):
#
#   sudo apt-get install -y nginx certbot python3-certbot-nginx
#
#   # Copy this file:
#   sudo cp nginx.conf /etc/nginx/sites-available/saygg.shop
#   sudo ln -s /etc/nginx/sites-available/saygg.shop \
#              /etc/nginx/sites-enabled/saygg.shop
#   sudo rm -f /etc/nginx/sites-enabled/default
#
#   # Obtain a free TLS cert (your VPS must own the domain):
#   sudo certbot --nginx -d saygg.shop -d www.saygg.shop
#
#   sudo nginx -t && sudo systemctl reload nginx
#
#   # Start the Node.js app (from the project root):
#   NODE_ENV=production node dist/index.cjs
# ─────────────────────────────────────────────────────────────────────────────

# Upstream Node.js backend
upstream nodejs_backend {
    server 127.0.0.1:5000;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name saygg.shop www.saygg.shop;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name saygg.shop www.saygg.shop;

    # ── TLS (filled in automatically by certbot) ──
    ssl_certificate     /etc/letsencrypt/live/saygg.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saygg.shop/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── KEY SETTING: silently drop headers with invalid names ──
    # This is the nginx default, stated explicitly for clarity.
    # "Charse t: UTF-8" has a space in the header name → nginx drops it → 
    # the clean request reaches Node.js → valid JSON response returned.
    ignore_invalid_headers on;

    # ── Proxy to Node.js ──
    location / {
        proxy_pass         http://nodejs_backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_buffering     off;
    }
}
